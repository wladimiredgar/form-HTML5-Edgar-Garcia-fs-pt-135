<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/29e78a2662.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container mt-4">
    <div class="card">
        <!--title-->
        <div class="card-header">
            <h1>Payment form example</h1>
        </div>
    <div class="card-body">
    <form class>
        <!--alert-->
        <div class="alert alert-danger" role="alert">
            A simple danger alert—check it out!
        </div>
        <!--first block-->
        <div class="row g-3">
            <div class="col-sm-12 col-md-5 col-lg-5">
                <label for="cardNumber" class="form-label">Card #</label>
                <input type="text" class="form-control" id="cardNumber" aria-describedby="passwordHelpBlock" placeholder="xxxxxxxxxxxxxxxx">
            </div>
            
            <div class="col-sm-12 col-md-3 col-lg-3">
                <label for="cvc" class="form-label">CVC #</label>
                <input type="password" id="cvc" class="form-control" aria-describedby="passwordHelpBlock" placeholder="0000">
            </div>
            
            <div class="col-sm-12 col-md-4 col-lg-4">
                <label for="card" class="form-label">Amount</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="text" class="form-control" aria-describedby="passwordHelpBlock" placeholder="Amount">
            </div>
            </div>
        </div>
        <!--second block-->
        <div class="row g-3">
            
            <div class="col-sm-12 col-md-6 col-lg-6">
                <div><label for="card" class="form-label">First Name</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-6">
                <div><label for="card" class="form-label">Last Name</label>
                    <input type="text" class="form-control">
                </div>
            </div>
            
        </div>
        <!--third block-->
        <div class="row g-3">
            <div class="col-sm-12 col-md-6 col-lg-6">
                <div><label for="card" class="form-label">City</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="col-sm-12 col-md-3 col-lg-3">
                <div><label for="card" class="form-label">State</label>
                    <select class="form-select" aria-label="Default select example">
                        <option selected>Pick a state</option>
                        <option value="1">One</option>
                        <option value="2">Two</option>
                        <option value="3">Three</option>
                    </select>
                </div>
            </div>

            <div class="col-sm-12 col-md-3 col-lg-3">
                <div><label for="card" class="form-label">Postal Code</label>
                    <input type="text" class="form-control">
                </div>
            </div>
        </div>
        <!--quarter block-->
        <div class="row g-3">

            <div class="col-sm-12 col-md-6 col-lg-6">
            
                <div><label for="card" class="form-label">We accept</label></div>
                <div class="bg-secondary rounded p-2 d-inline-block text-white">
                <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-mastercard fa-lg"></i></label>
                </div>

                <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option1">
                <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-visa fa-lg"></i></label>
                </div>

                <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option1">
                <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-diners-club fa-lg"></i></label>
                </div>

                <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio4" value="option1">
                <label class="form-check-label" for="inlineRadio1"><i class="fa-brands fa-cc-amex fa-lg"></i></label>
                </div>
                </div>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-6">
                    <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                    <div class="form-text">Add any notes here.</div>
            </div>
            
        </div>
    </div>
        <!--start footer-->
        <div class="card-footer">
        <div class="row g-3">
            <div class="d-flex justify-content-end gap-2 flex-wrap">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button class="btn btn-primary" type="button">Send</button>
            </div>
        </div>
        </div>
    </form>
    </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
